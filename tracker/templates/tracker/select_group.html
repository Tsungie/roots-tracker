<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Workspace | Roots</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .group-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
            background-color: #8e44ad;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .group-btn:hover {
            background-color: #732d91;
        }
        .empty-state {
            color: #e74c3c;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👋 Welcome, Admin!</h1>
        <p>Select a workspace to manage your group.</p>

        <form method="POST">
            {% csrf_token %}
            
            {% for group in groups %}
                <button type="submit" name="group_id" value="{{ group.id }}" class="group-btn">
                    📁 {{ group.name }}
                </button>
            {% empty %}
                <p class="empty-state">No groups found. Create one in the Django Admin page!</p>
            {% endfor %}

        </form>
    </div>

</body>
</html>
