<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance | R.O.O.T.S</title>
    <style>
        :root {
            --roots-purple: #8e44ad;
            --roots-brown: #5d4037;
            --roots-bg: #fdfaf6;
            --text-dark: #2c3e50;
        }

        body {
            background-color: var(--roots-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
        }

        .attendance-container {
            max-width: 900px;
            margin: 20px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            border-top: 8px solid var(--roots-purple);
        }

        /* Branding Header */
        .brand-header {
            display: flex;
            align-items: center;
            gap: 25px;
            padding-bottom: 25px;
            border-bottom: 2px solid #f1f1f1;
            margin-bottom: 30px;
        }

        .brand-header img {
            height: 90px;
            width: auto;
        }

        /* Form Controls */
        .session-info {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--roots-brown);
        }

        select, input[type="text"], input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        /* Modern Table */
        .attendance-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .attendance-table th {
            color: #95a5a6;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1.2px;
            padding: 10px;
            text-align: left;
        }

        .attendance-row td {
            background: #fff;
            padding: 15px 10px;
            border-top: 1px solid #f1f1f1;
            border-bottom: 1px solid #f1f1f1;
        }

        .attendance-row td:first-child { 
            border-left: 1px solid #f1f1f1; 
            border-radius: 12px 0 0 12px;
            font-weight: 600;
        }
        
        .attendance-row td:last-child { 
            border-right: 1px solid #f1f1f1; 
            border-radius: 0 12px 12px 0;
        }

        /* Buttons */
        .quick-action-btn {
            background: none;
            border: 1.5px solid var(--roots-purple);
            color: var(--roots-purple);
            padding: 8px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .quick-action-btn:hover {
            background: var(--roots-purple);
            color: white;
        }

        .save-btn {
            background: var(--roots-purple);
            color: white;
            padding: 18px 50px;
            border: none;
            border-radius: 35px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            display: block;
            margin: 40px auto 0;
            box-shadow: 0 10px 20px rgba(142, 68, 173, 0.3);
        }

        .save-btn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }
    </style>
</head>
<body>

<div class="attendance-container">
    <div class="brand-header">
        <img src="/media/roots-logo.png" alt="Roots Logo">
        <div>
            <h1 style="margin:0; color: var(--roots-purple);">Attendance Register</h1>
            <p style="margin:0; opacity: 0.7;">Group: {{ active_group.name }}</p>
        </div>
    </div>

    <form method="POST">
        {% csrf_token %}
        
        <div class="session-info">
            <div>
                <label>Meeting Date</label>
                <input type="date" name="meeting_date" value="{{ today }}" required>
            </div>
            <div>
                <label>Grounding Session / Topic</label>
                <select name="topic_id" required>
                    <option value="" disabled selected>-- Select Today's Topic --</option>
                    {% for topic in topics %}
                    <option value="{{ topic.id }}">{{ topic.title }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div style="text-align: right; margin-bottom: 15px;">
            <button type="button" class="quick-action-btn" onclick="markAllPhysical()">
                ✨ Mark All Physical
            </button>
        </div>

        <table class="attendance-table">
            <thead>
                <tr>
                    <th>Member Name</th>
                    <th>Status</th>
                    <th>Comments / Notes</th>
                </tr>
            </thead>
            <tbody>
                {% for member in members %}
                <tr class="attendance-row">
                    <td>{{ member.first_name }} {{ member.last_name }}</td>
                    <td>
                        <select name="mode_{{ member.id }}">
                            <option value="physical">Physical</option>
                            <option value="online">Online</option>
                            <option value="absent">Absent</option>
                        </select>
                    </td>
                    <td>
                        <input type="text" name="comment_{{ member.id }}" placeholder="e.g. Traveled, Baptism...">
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button type="submit" class="save-btn">
            ✅ Save All Records
        </button>
    </form>
</div>

<script>
    function markAllPhysical() {
        const selects = document.querySelectorAll('select[name^="mode_"]');
        selects.forEach(select => select.value = 'physical');
    }
</script>

</body>
</html>
